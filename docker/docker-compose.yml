services:

  miransas-db-postgres:
    image: postgres:16-alpine
    container_name: miransas-db-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: miransas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD gerekli}
      POSTGRES_DB: miransas
    ports:
      - "5432:5432"
    volumes:
      - miransas_db_data:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
      - "-c"
      - "hba_file=/etc/postgresql/pg_hba.conf"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miransas -d miransas"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - miransas_db_net

  miransas-db-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: miransas-db-backend
    restart: unless-stopped
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: "3001"
      DATABASE_URL: postgres://miransas:${POSTGRES_PASSWORD}@miransas-db-postgres:5432/miransas
      DATABASE_MAX_CONNECTIONS: "10"
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD gerekli}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET gerekli min 32 char}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY gerekli min 32 char}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://console.miransas.com}
      RUST_LOG: miransas_db=info,tower_http=info
      MIRANSAS_PUBLIC_DB_HOST: ${MIRANSAS_PUBLIC_DB_HOST:-panel.miransas.com}
      MIRANSAS_PUBLIC_DB_PORT: ${MIRANSAS_PUBLIC_DB_PORT:-5432}
      MIRANSAS_PUBLIC_DB_NAME: ${MIRANSAS_PUBLIC_DB_NAME:-miransas}
    depends_on:
      miransas-db-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - miransas_db_net

volumes:
  miransas_db_data:

networks:
  miransas_db_net:
    driver: bridge

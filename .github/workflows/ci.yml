name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Format ──────────────────────────────────────────────────────────────────
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
        working-directory: backend

  # ── Lint ────────────────────────────────────────────────────────────────────
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workdir: backend
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: backend

  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    name: test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB:       miransas_test
        options: >-
          --health-cmd "pg_isready -U testuser -d miransas_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workdir: backend

      - name: Run tests
        run: cargo test --all-features
        working-directory: backend
        env:
          DATABASE_URL:   postgres://testuser:testpassword@localhost:5432/miransas_test
          ADMIN_PASSWORD: test-admin-password-ok
          JWT_SECRET:     test-jwt-secret-key-exactly-32chars
          SECRET_KEY:     test-secret-key-exactly-32chars-ok!
          CORS_ORIGIN:    http://localhost:3000

  # ── Build (release) ─────────────────────────────────────────────────────────
  build:
    name: build release
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workdir: backend
      - name: Build release binary
        run: cargo build --release
        working-directory: backend
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: miransas-db-linux-x86_64
          path: backend/target/release/miransas-db
          retention-days: 7
